<app-header-content-layout>
  <app-field-title header [title]="'Select cex pool'"></app-field-title>
  <app-autocomplete
    [title]="'pool'"
    [list]="(chainsList | async)!"
    [selected]="formData.source"
    (emitter)="events($event, 'cex_pair_id')"
    content
  ></app-autocomplete>
</app-header-content-layout>

<app-header-content-layout>
  <app-field-title header [title]="'Type'"></app-field-title>
  <app-input-field
    [inputValue]="formData.job_type"
    (emitter)="events($event, 'job_type')"
    content
  ></app-input-field>
</app-header-content-layout>

<app-header-content-layout>
  <app-field-title header [title]="'Description'"></app-field-title>
  <app-input-field
    [inputValue]="formData.description"
    (emitter)="events($event, 'description')"
    content
  ></app-input-field>
</app-header-content-layout>
